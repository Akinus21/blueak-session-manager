name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      new_version: ${{ steps.version.outputs.new_version }}

    steps:
      - uses: actions/checkout@v4

      - name: Fetch all tags
        run: git fetch --tags

      - name: Determine next version
        id: version
        run: |
          # Find the highest existing tag
          LAST_TAG=$(git tag --list 'v*' --sort=-v:refname | head -1 || echo "")
          if [ -z "$LAST_TAG" ]; then
            NEW_VERSION="0.00.1"
          else
            # Extract version number and increment
            LAST_NUM="${LAST_TAG#v}"
            MAJOR=$(echo $LAST_NUM | cut -d. -f1)
            MINOR=$(echo $LAST_NUM | cut -d. -f2)
            PATCH=$(echo $LAST_NUM | cut -d. -f3)
            PATCH=$((PATCH + 1))
            NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          fi
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Update Cargo.toml version
        run: |
          NEW_VERSION="${{ steps.version.outputs.new_version }}"
          sed -i 's/^version = ".*"$/version = "'$NEW_VERSION'"/' Cargo.toml
          cat Cargo.toml

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libxkbcommon-dev libwayland-dev pkg-config

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build
        id: build
        run: |
          set -o pipefail
          cargo build --release 2>&1 | tee build.log
        shell: bash

      - name: Upload artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: blueak-session-manager-build
          path: |
            target/release/
            dist/
            build/
          if-no-files-found: ignore
          retention-days: 30

      - name: Create release
        if: success() && github.ref == 'refs/heads/main'
        run: |
          NEW_VERSION="${{ steps.version.outputs.new_version }}"
          TAG="v$NEW_VERSION"

          # Create CHANGELOG.md if it doesn't exist, otherwise append
          if [ ! -f CHANGELOG.md ]; then
            echo "# Changelog\n\n## $NEW_VERSION" > CHANGELOG.md
          else
            sed -i "1s/^/# Changelog\n\n## $NEW_VERSION\n/" CHANGELOG.md
          fi

          # Update README.md version if it exists
          if [ -f README.md ]; then
            sed -i 's/version [0-9]\+\.[0-9]\+\.[0-9]\+/version '$NEW_VERSION'/' README.md
          fi

          # Commit changes
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Cargo.toml CHANGELOG.md README.md 2>/dev/null || true
          git commit -m "release: v$NEW_VERSION" || true
          git tag "$TAG"
          git push origin main --tags

      - name: Create GitHub Release
        if: success() && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          files: target/release/blueak-session-manager
          body_path: CHANGELOG.md
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Notify webhook on build completion
        if: always() && github.ref == 'refs/heads/main'
        run: |
          if [ -f build.log ]; then
            if result=$(grep -q "error\|failed\|Error\|Failed" build.log 2>/dev/null); then
              BUILD_STATUS="failure"
              ERRORS=$(tail -150 build.log)
            else
              BUILD_STATUS="success"
              ERRORS=""
            fi
          else
            BUILD_STATUS="failure"
            ERRORS="Build log not found"
          fi
          if [ "${{ job.status }}" = "success" ]; then
            BUILD_STATUS="success"
            ERRORS=""
          elif [ "${{ job.status }}" = "failure" ]; then
            BUILD_STATUS="failure"
            ERRORS=$(cat build.log 2>/dev/null | tail -150 || echo "Build failed")
          fi
          PAYLOAD=$(jq -n \
            --arg status "$BUILD_STATUS" \
            --arg errors "$ERRORS" \
            --arg run_url "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --arg sha "${{ github.sha }}" \
            --arg version "${{ steps.version.outputs.new_version }}" \
            '{status: $status, errors: $errors, run_url: $run_url, sha: $sha, version: $version}')
          SIG=$(echo -n "$PAYLOAD" | \
            openssl dgst -sha256 -hmac "${{ secrets.WEBHOOK_SECRET }}" | \
            awk '{print "sha256="$2}')
          curl -fsSL -X POST \
            -H "Content-Type: application/json" \
            -H "X-GitHub-Event: build_complete" \
            -H "X-Hub-Signature-256: $SIG" \
            -d "$PAYLOAD" \
            "${{ secrets.WEBHOOK_URL }}" || true