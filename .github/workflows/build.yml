name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-tags: true
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libxkbcommon-dev libwayland-dev pkg-config jq

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}-${{ hashFiles('src/**') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
            ${{ runner.os }}-cargo-

      - name: Build
        id: build
        run: |
          set -o pipefail
          cargo build --release 2>&1 | tee build.log
        shell: bash

      - name: Verify binary
        run: |
          SIZE=$(stat -c%s target/release/blueak-session-manager)
          echo "Binary size: $SIZE bytes"
          if [ "$SIZE" -lt 10000 ]; then
            echo "ERROR: Binary too small ($SIZE bytes), likely a cache or build issue"
            exit 1
          fi

      - name: Upload artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: blueak-session-manager-build
          path: target/release/blueak-session-manager
          if-no-files-found: error
          retention-days: 30

      - name: Compute new tag
        if: success() && github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        id: tag
        run: |
          git fetch --tags
          PREV_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          VERSION=$(echo "$PREV_TAG" | sed 's/^v//')
          MAJOR=$(echo "$VERSION" | cut -d. -f1 | sed 's/^0*//')
          MINOR=$(echo "$VERSION" | cut -d. -f2 | sed 's/^0*//')
          PATCH=$(echo "$VERSION" | cut -d. -f3 | sed 's/^0*//')
          [ -z "$MAJOR" ] && MAJOR=0
          [ -z "$MINOR" ] && MINOR=0
          [ -z "$PATCH" ] && PATCH=0
          while git rev-parse "v${MAJOR}.${MINOR}.${PATCH}" >/dev/null 2>&1; do
            PATCH=$((10#$PATCH + 1))
          done
          NEW_TAG="v${MAJOR}.${MINOR}.${PATCH}"
          echo "new_tag=$NEW_TAG" >> $GITHUB_OUTPUT

      - name: Update Cargo.toml version
        if: success() && github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        run: |
          NEW_TAG="${{ steps.tag.outputs.new_tag }}"
          VERSION="${NEW_TAG#v}"
          awk -F'= ' '/^\[package\]/{p=1} p && /^version/{gsub(/"[^"]+"/,"\"'"$VERSION"'\""); p=0} 1' Cargo.toml > tmp && mv tmp Cargo.toml
          git add Cargo.toml
          git config --global user.email "aktags-bot@akinus21.com"
          git config --global user.name "AkTags Bot"
          git commit -m "chore: bump version to ${VERSION}"

      - name: Tag and create GitHub release with binary
        if: success() && github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        id: release
        run: |
          git config --global user.email "aktags-bot@akinus21.com"
          git config --global user.name "AkTags Bot"

          NEW_TAG="${{ steps.tag.outputs.new_tag }}"
          BINARY="target/release/blueak-session-manager"

          if [ ! -s "$BINARY" ]; then
            echo "ERROR: Binary missing or empty at $BINARY"
            exit 1
          fi

          SHA256=$(sha256sum "$BINARY" | awk '{print $1}')
          SIZE=$(stat -c%s "$BINARY")
          echo "Binary size: $SIZE bytes"
          echo "SHA256: $SHA256"

          if [ "$SIZE" -lt 10000 ]; then
            echo "ERROR: Binary too small"
            exit 1
          fi

          git tag -a "$NEW_TAG" -m "Release $NEW_TAG"
          git push origin "$NEW_TAG"

          GH_TOKEN="${{ secrets.GITHUB_TOKEN }}" gh release create "$NEW_TAG" \
            --title "$NEW_TAG" \
            --notes "" \
            "$BINARY#blueak-session-manager"

          ASSET_COUNT=$(GH_TOKEN="${{ secrets.GITHUB_TOKEN }}" gh release view "$NEW_TAG" --json assets --jq '.assets | length')
          echo "Assets uploaded: $ASSET_COUNT"
          if [ "$ASSET_COUNT" -lt 1 ]; then
            echo "ERROR: No assets found on release after upload"
            exit 1
          fi

          echo "sha256=$SHA256" >> $GITHUB_OUTPUT
          echo "new_tag=$NEW_TAG" >> $GITHUB_OUTPUT

      - name: Update homebrew tap
        if: success() && github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        env:
          TAP_TOKEN: ${{ secrets.TAP_TOKEN }}
        run: |
          git config --global user.email "aktags-bot@akinus21.com"
          git config --global user.name "AkTags Bot"

          NEW_TAG="${{ steps.tag.outputs.new_tag }}"
          SHA256="${{ steps.release.outputs.sha256 }}"
          BINARY_URL="https://github.com/Akinus21/blueak-session-manager/releases/download/${NEW_TAG}/blueak-session-manager"

          git clone https://x-access-token:${TAP_TOKEN}@github.com/Akinus21/homebrew-tap.git /tmp/homebrew-tap
          cd /tmp/homebrew-tap
          git config --global credential.helper store
          echo "https://x-access-token:${TAP_TOKEN}@github.com" >> ~/.git-credentials

          cat > Formula/blueak-session-manager.rb <<'FORMULA_EOF'
          class BlueakSessionManager < Formula
            desc "Saves and restores niri compositor session state"
            homepage "https://github.com/Akinus21/blueak-session-manager"
            version "VERSION"
            url "URL"
            sha256 "SHA256"

            def install
              bin.install "blueak-session-manager"
            end

            def post_install
              systemd_dir = ENV["HOME"] + "/.config/systemd/user"
              mkdir_p systemd_dir

              save_service = <<~EOS
                [Unit]
                Description=Save niri session state
                Before=niri.service
                DefaultDependencies=no
                After=graphical-session.target

                [Service]
                Type=oneshot
                RemainAfterExit=no
                ExecStart=#{bin}/blueak-session-manager save
                Environment="PATH=/usr/local/bin:/usr/bin:/bin:#{bin}"
                PassEnvironment=NIRI_SOCKET

                [Install]
                WantedBy=graphical-session-pre.target
              EOS

              restore_service = <<~EOS
                [Unit]
                Description=Restore niri session state
                After=graphical-session.target niri.service
                PartOf=graphical-session.target

                [Service]
                Type=oneshot
                RemainAfterExit=no
                ExecStart=#{bin}/blueak-session-manager restore
                Environment="PATH=/usr/local/bin:/usr/bin:/bin:#{bin}"
                PassEnvironment=NIRI_SOCKET WAYLAND_DISPLAY XDG_RUNTIME_DIR
                TimeoutStartSec=60

                [Install]
                WantedBy=graphical-session.target
              EOS

              (systemd_dir / "blueak-session-save.service").write save_service
              (systemd_dir / "blueak-session-restore.service").write restore_service
            end

            test do
              system bin/"blueak-session-manager", "--version"
            end
          end
          FORMULA_EOF

          sed -i 's|VERSION|'"${NEW_TAG#v}"'|g' Formula/blueak-session-manager.rb
          sed -i 's|URL|'"${BINARY_URL}"'|g' Formula/blueak-session-manager.rb
          sed -i 's|SHA256|'"${SHA256}"'|g' Formula/blueak-session-manager.rb

          git add Formula/blueak-session-manager.rb
          git commit -m "Update blueak-session-manager to ${NEW_TAG}"
          git push

      - name: Notify webhook on failure
        if: failure() && github.ref == 'refs/heads/main'
        env:
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
        run: |
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          SHA="${{ github.sha }}"
          COMMIT_MSG=$(git log -1 --pretty=format:"%s" "$SHA" 2>/dev/null || echo "unknown")
          ERRORS=$(cat build.log 2>/dev/null | tail -200 | jq -Rs . || echo '"build log not found"')

          PAYLOAD=$(jq -cn \
            --arg run_url "$RUN_URL" \
            --arg sha "$SHA" \
            --arg commit_msg "$COMMIT_MSG" \
            --arg ref "${{ github.ref_name }}" \
            --arg actor "${{ github.actor }}" \
            --argjson errors "$ERRORS" \
            '{run_url:$run_url,sha:$sha,commit_msg:$commit_msg,ref:$ref,actor:$actor,errors:$errors}')

          SIG=$(printf '%s' "$PAYLOAD" | \
            openssl dgst -sha256 -hmac "$WEBHOOK_SECRET" | \
            awk '{print "sha256="$2}')

          curl -fsSL -X POST \
            -H "Content-Type: application/json" \
            -H "X-GitHub-Event: build_failure" \
            -H "X-Hub-Signature-256: $SIG" \
            -d "$PAYLOAD" \
            "${{ secrets.WEBHOOK_URL }}" || true

      - name: Notify webhook on success
        if: success() && github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        env:
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
        run: |
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          SHA="${{ github.sha }}"
          COMMIT_MSG=$(git log -1 --pretty=format:"%s" "$SHA" 2>/dev/null || echo "unknown")

          PAYLOAD=$(jq -cn \
            --arg run_url "$RUN_URL" \
            --arg sha "$SHA" \
            --arg commit_msg "$COMMIT_MSG" \
            --arg ref "${{ github.ref_name }}" \
            --arg actor "${{ github.actor }}" \
            '{event:"build_success",run_url:$run_url,sha:$sha,commit_msg:$commit_msg,ref:$ref,actor:$actor}')

          SIG=$(printf '%s' "$PAYLOAD" | \
            openssl dgst -sha256 -hmac "$WEBHOOK_SECRET" | \
            awk '{print "sha256="$2}')

          curl -fsSL -X POST \
            -H "Content-Type: application/json" \
            -H "X-GitHub-Event: build_success" \
            -H "X-Hub-Signature-256: $SIG" \
            -d "$PAYLOAD" \
            "${{ secrets.WEBHOOK_URL }}" || true